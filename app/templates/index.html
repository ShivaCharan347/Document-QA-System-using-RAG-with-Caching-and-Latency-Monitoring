<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocRAG Explorer</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons for elegant UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo">
                <i class="ph-fill ph-stack"></i> DocRAG Explorer
            </div>
            <div class="status-indicator">
                <span class="pulse-dot"></span> API Active
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <div class="hero">
                <h1>Ask your documents anything</h1>
                <p>Powered by advanced RAG and the all-MiniLM embedding model</p>
            </div>

            <div class="search-container glass-panel">
                <form id="query-form">
                    <div class="input-wrapper">
                        <i class="ph ph-magnifying-glass search-icon"></i>
                        <input type="text" id="query-input" placeholder="e.g., What are the main key points in the report?" autocomplete="off" required>
                        <button type="submit" id="submit-btn" class="glow-on-hover">
                            <i class="ph ph-paper-plane-right"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Results Section -->
            <div id="results-container" class="results-container hidden">
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <span>Analyzing documents...</span>
                </div>

                <div id="answer-box" class="answer-box glass-panel hidden">
                    <h3><i class="ph-fill ph-sparkle"></i> Answer</h3>
                    <div id="answer-content" class="content"></div>
                </div>

                <div id="sources-box" class="sources-box hidden">
                    <h4><i class="ph-fill ph-files"></i> Sources</h4>
                    <ul id="sources-list"></ul>
                </div>

                <div id="error-box" class="error-box glass-panel hidden">
                    <i class="ph-fill ph-warning-circle"></i>
                    <span id="error-message"></span>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
</body>
</html>
